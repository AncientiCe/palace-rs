name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive_ext: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build release binary
        run: cargo build --release --features cli --target ${{ matrix.target }}

      - name: Package Unix artifact
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          asset="palace-${version}-${{ matrix.target }}"
          mkdir -p "dist/${asset}"
          cp "target/${{ matrix.target }}/release/palace" "dist/${asset}/"
          strip "dist/${asset}/palace" || true
          cp README.md LICENSE CHANGELOG.md "dist/${asset}/"
          tar -C dist -czf "dist/${asset}.tar.gz" "${asset}"

      - name: Package Windows artifact
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart("v")
          $asset = "palace-$version-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "dist/$asset" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/palace.exe" "dist/$asset/"
          Copy-Item README.md,LICENSE,CHANGELOG.md "dist/$asset/"
          Compress-Archive -Path "dist/$asset/*" -DestinationPath "dist/$asset.zip"

      - name: Generate Unix checksum
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          cd dist
          asset="$(ls palace-*-${{ matrix.target }}.tar.gz)"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$asset" > palace-${{ matrix.target }}.sha256
          else
            shasum -a 256 "$asset" > palace-${{ matrix.target }}.sha256
          fi

      - name: Generate Windows checksum
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $asset = Get-ChildItem -Path dist -Filter "palace-*-${{ matrix.target }}.zip" | Select-Object -First 1
          $hash = (Get-FileHash -Algorithm SHA256 $asset.FullName).Hash.ToLowerInvariant()
          "$hash  $($asset.Name)" | Out-File -FilePath "dist/palace-${{ matrix.target }}.sha256" -Encoding ascii

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          notes="dist/release-notes.md"
          awk -v version="$version" '
            index($0, "## [" version "] - ") == 1 {
              in_section = 1
              print
              next
            }
            in_section && /^## \[/ {
              exit
            }
            in_section {
              print
            }
          ' CHANGELOG.md > "$notes"
          if [ ! -s "$notes" ]; then
            {
              echo "Release ${GITHUB_REF_NAME}"
              echo
              echo "No matching CHANGELOG.md section found for ${GITHUB_REF_NAME}."
            } > "$notes"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/palace-*-${{ matrix.target }}.${{ matrix.archive_ext }}
            dist/palace-${{ matrix.target }}.sha256

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/palace
            target/${{ matrix.target }}/release/palace.exe
          if-no-files-found: ignore
          retention-days: 1

  # Assemble a single MCP Bundle (.mcpb) containing the linux/macOS/windows
  # binaries plus a manifest, upload it to the release, and expose its SHA-256 so
  # the registry publish job can reference it. The .mcpb extension satisfies the
  # official MCP registry rule that MCPB package URLs must contain "mcp".
  bundle:
    name: Build MCPB bundle
    needs: build
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.hash.outputs.sha256 }}
    steps:
      - uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: artifacts

      - name: Assemble MCPB bundle
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir -p bundle/server dist
          cp "artifacts/binary-x86_64-unknown-linux-gnu/palace"  "bundle/server/palace-linux-x86_64"
          cp "artifacts/binary-aarch64-apple-darwin/palace"      "bundle/server/palace-darwin-arm64"
          cp "artifacts/binary-x86_64-pc-windows-msvc/palace.exe" "bundle/server/palace-windows-x86_64.exe"
          chmod +x "bundle/server/palace-linux-x86_64" "bundle/server/palace-darwin-arm64"
          jq --arg v "$version" '.version = $v' manifest.json > "bundle/manifest.json"
          ( cd bundle && zip -r -X "../dist/palace-${version}.mcpb" . )

      - name: Compute bundle SHA-256
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          file="dist/palace-${version}.mcpb"
          sha="$(openssl dgst -sha256 "$file" | awk '{print $NF}')"
          echo "sha256=${sha}" >> "$GITHUB_OUTPUT"
          echo "${sha}  palace-${version}.mcpb" > "dist/palace-${version}.mcpb.sha256"
          echo "MCPB SHA-256: ${sha}"

      - name: Upload MCPB to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/palace-*.mcpb
            dist/palace-*.mcpb.sha256

  # Publish the server metadata to the official MCP registry. Uses GitHub Actions
  # OIDC to authenticate the io.github.ancientice namespace (no browser, no
  # stored secret). Runs after the bundle so the .mcpb URL resolves and its
  # SHA-256 is known.
  publish-registry:
    name: Publish to MCP registry
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Fill server.json for this release
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/palace-${version}.mcpb"
          sha="${{ needs.bundle.outputs.sha256 }}"
          # Derive the namespace from the repo owner so its casing always matches
          # the OIDC-granted namespace (io.github.<owner>/*), which is case-sensitive.
          name="io.github.${GITHUB_REPOSITORY_OWNER}/palace-rs"
          jq \
            --arg name "$name" \
            --arg v "$version" \
            --arg url "$url" \
            --arg sha "$sha" \
            '.name = $name | .version = $v | .packages[0].version = $v | .packages[0].identifier = $url | .packages[0].fileSha256 = $sha' \
            server.json > server.tmp
          mv server.tmp server.json
          cat server.json

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server to MCP registry
        run: ./mcp-publisher publish

  # End-to-end smoke of the published release: the install script must detect
  # the platform, download the real asset, verify its checksum, and install.
  install-smoke:
    name: Release install smoke (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
          - os: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install from published release
        shell: bash
        env:
          PALACE_VERSION: ${{ github.ref_name }}
          PALACE_INSTALL_DIR: ${{ runner.temp }}/palace-bin
          HOME: ${{ runner.temp }}/palace-home
        run: |
          mkdir -p "$HOME"
          sh scripts/install.sh
          "$PALACE_INSTALL_DIR/palace" --version

